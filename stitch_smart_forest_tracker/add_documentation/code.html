<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "error-container": "#ffdad6",
            "tertiary": "#4f1c00",
            "secondary-container": "#fed5b6",
            "tertiary-fixed-dim": "#ffb693",
            "on-primary-fixed": "#062014",
            "error": "#ba1a1a",
            "inverse-surface": "#263142",
            "on-primary": "#ffffff",
            "surface-dim": "#cfdaf1",
            "inverse-primary": "#b0cdbb",
            "on-surface": "#111c2c",
            "inverse-on-surface": "#ebf1ff",
            "tertiary-fixed": "#ffdbcc",
            "on-secondary-fixed-variant": "#5c412a",
            "outline": "#727973",
            "surface-variant": "#d8e3fa",
            "surface-container-lowest": "#ffffff",
            "on-tertiary": "#ffffff",
            "surface-container-high": "#dee8ff",
            "primary": "#173124",
            "on-error-container": "#93000a",
            "on-tertiary-container": "#ff9159",
            "surface-tint": "#496455",
            "on-primary-container": "#98b5a3",
            "primary-fixed": "#ccead6",
            "on-secondary-fixed": "#2b1704",
            "surface-container-low": "#f0f3ff",
            "primary-container": "#2d4739",
            "secondary-fixed": "#ffdcc1",
            "outline-variant": "#c2c8c2",
            "tertiary-container": "#722c00",
            "on-primary-fixed-variant": "#324c3e",
            "on-background": "#111c2c",
            "on-secondary-container": "#795b42",
            "on-tertiary-fixed-variant": "#7a3000",
            "on-secondary": "#ffffff",
            "surface": "#f9f9ff",
            "surface-bright": "#f9f9ff",
            "on-error": "#ffffff",
            "background": "#f9f9ff",
            "on-surface-variant": "#424844",
            "on-tertiary-fixed": "#351000",
            "surface-container": "#e7eeff",
            "surface-container-highest": "#d8e3fa",
            "secondary-fixed-dim": "#e6bfa1",
            "secondary": "#765840",
            "primary-fixed-dim": "#b0cdbb"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "spacing": {
            "margin-main": "1.25rem",
            "gutter-grid": "1rem",
            "stack-lg": "1.5rem",
            "touch-target": "3rem",
            "stack-sm": "0.5rem",
            "stack-md": "1rem"
          },
          "fontFamily": {
            "label-sm": ["Public Sans"],
            "headline-md": ["Public Sans"],
            "body-lg": ["Public Sans"],
            "body-md": ["Public Sans"],
            "label-md": ["Public Sans"],
            "headline-lg": ["Public Sans"]
          },
          "fontSize": {
            "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "700"}],
            "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
            "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
            "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
            "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.02em", "fontWeight": "600"}],
            "headline-lg": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
    }
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #E2E8F0;
      border-radius: 10px;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body-md text-on-surface custom-scrollbar">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-5 h-16 bg-white dark:bg-stone-950 border-b-[1px] border-[#E2E8F0] dark:border-stone-800">
<div class="flex items-center gap-3">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-stone-100 transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-[#2D4739] dark:text-emerald-500">New Observation</h1>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-stone-500 hover:bg-stone-100 p-2 rounded-full cursor-pointer">more_vert</span>
</div>
</header>
<main class="pt-20 pb-28 px-margin-main max-w-2xl mx-auto">
<!-- Photo Upload Section -->
<section class="mb-stack-lg">
<div class="relative w-full aspect-video rounded-xl border-2 border-dashed border-outline-variant bg-surface-container-low flex flex-col items-center justify-center cursor-pointer hover:bg-surface-container transition-colors overflow-hidden group">
<div class="flex flex-col items-center">
<span class="material-symbols-outlined text-[48px] text-primary mb-2" data-icon="add_a_photo">add_a_photo</span>
<span class="font-label-md text-label-md text-on-surface-variant">Add Photo</span>
</div>
<img class="absolute inset-0 w-full h-full object-cover opacity-0 group-hover:opacity-10 transition-opacity" data-alt="dense coniferous forest with sunlight filtering through needles and morning mist in the background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD395kuLBwAzaVg-a5In61OJplfin25H9iaT7JYtNk5lTgtRVjPgRM9kTYm7H1QUB8YWYzDJpbiJxsG65-4De7p4KtElbrVDDNYHZgJkYcF23cADH3lVqLwP1F5rT1sDRXrpPlbsIeNwQtOhmxdQfpaLrnO3vtRTqALNHuGidX5x5wxky-Osb-iB4l8i4Wz-6nufOrrNxu7seiMp5OaLXAvHH_vuR5jtOsS0cym9QxH5CC60T84OhLjlIuBzUFqtbetF_5dv9mrIpaz"/>
</div>
</section>
<!-- Form Section -->
<form class="space-y-stack-lg">
<!-- Description -->
<div class="space-y-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="description">description</span>
          Description
        </label>
<textarea class="w-full min-h-[120px] p-4 bg-white border-b-2 border-[#E2E8F0] focus:border-primary-container focus:ring-0 text-body-md font-body-md transition-all placeholder:text-outline outline-none" placeholder="Describe forest conditions, species, or issues observed..."></textarea>
</div>
<!-- Priority Picker -->
<div class="space-y-stack-sm">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="priority_high">priority_high</span>
          Priority Level
        </label>
<div class="grid grid-cols-3 gap-3">
<button class="flex flex-col items-center justify-center py-3 px-2 rounded-lg border-2 border-[#E2E8F0] hover:border-primary-container transition-all active:scale-95" type="button">
<span class="w-3 h-3 rounded-full bg-primary mb-2"></span>
<span class="font-label-sm text-label-sm uppercase">Low</span>
</button>
<button class="flex flex-col items-center justify-center py-3 px-2 rounded-lg border-2 border-[#E2E8F0] hover:border-tertiary transition-all active:scale-95" type="button">
<span class="w-3 h-3 rounded-full bg-tertiary-container mb-2"></span>
<span class="font-label-sm text-label-sm uppercase">Medium</span>
</button>
<button class="flex flex-col items-center justify-center py-3 px-2 rounded-lg border-primary-container bg-primary-container text-white shadow-md active:scale-95" type="button">
<span class="w-3 h-3 rounded-full bg-[#FF6B00] mb-2"></span>
<span class="font-label-sm text-label-sm uppercase">Urgent</span>
</button>
</div>
</div>
<!-- Location Section -->
<div class="space-y-stack-sm">
<div class="flex justify-between items-end">
<label class="font-label-md text-label-md text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]" data-icon="location_on">location_on</span>
            Location
          </label>
<span class="font-label-sm text-label-sm text-primary tracking-widest">45.523062, -122.676482</span>
</div>
<div class="relative rounded-xl overflow-hidden h-40 border border-[#E2E8F0] shadow-sm">
<img class="w-full h-full object-cover grayscale-[20%]" data-alt="topographic satellite map showing forest grid lines and a circular marker over a wooded area" data-location="Oregon National Forest" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAHbld9gNFG2j61n-Z_vgqBilPscIEM9FoNUnXKu1kA-KvN5JY3BkcndKivk2TRI7VelBRy8zos8nvr1Zi8H1vf0FyQRqk0upkVF1aiZQJ37-qCfQtk-aA1vW2FX0tHOkIAUTtdPRUwxJ27Wg4KJwdzb_htkR2vIKMXTRKInrm7Q1tApdkkyYGWJN5eHPSBYW_2ZWjbqqjme96TG4oaqxrKDjhSRWVjLLQFi4p3ITciqnMMtr8gSv1K_5UFAt9tTT4oHz-BOWcjSLBT"/>
<div class="absolute inset-0 bg-primary/10 pointer-events-none"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-[#FF6B00] text-4xl" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div class="absolute bottom-2 right-2 bg-white/90 backdrop-blur px-2 py-1 rounded text-[10px] font-bold text-primary flex items-center gap-1">
<span class="material-symbols-outlined text-[12px]" data-icon="gps_fixed">gps_fixed</span>
            GPS ACTIVE
          </div>
</div>
</div>
<!-- Submit Button -->
<div class="pt-stack-md">
<button class="w-full h-touch-target bg-[#FF6B00] hover:bg-[#E66000] text-white font-label-md text-label-md uppercase tracking-widest rounded-lg shadow-lg flex items-center justify-center gap-2 transition-all active:scale-95" type="submit">
          Submit Observation
          <span class="material-symbols-outlined" data-icon="send">send</span>
</button>
</div>
</form>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pt-2 pb-safe bg-white dark:bg-stone-950 h-20 border-t-[1px] border-[#E2E8F0] dark:border-stone-800 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] md:hidden">
<div class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 py-1 w-16 hover:text-[#2D4739] transition-transform duration-150 active:scale-95">
<span class="material-symbols-outlined" data-icon="map">map</span>
<span class="font-label-sm text-[11px] font-medium uppercase tracking-wider mt-1">Map</span>
</div>
<div class="flex flex-col items-center justify-center text-[#2D4739] dark:text-emerald-400 bg-stone-100 dark:bg-emerald-900/20 rounded-md py-1 w-16 transition-transform duration-150 active:scale-95">
<span class="material-symbols-outlined" data-icon="add_a_photo" style="font-variation-settings: 'FILL' 1;">add_a_photo</span>
<span class="font-label-sm text-[11px] font-medium uppercase tracking-wider mt-1">Record</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 py-1 w-16 hover:text-[#2D4739] transition-transform duration-150 active:scale-95">
<span class="material-symbols-outlined" data-icon="assignment">assignment</span>
<span class="font-label-sm text-[11px] font-medium uppercase tracking-wider mt-1">Tasks</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-500 dark:text-stone-400 py-1 w-16 hover:text-[#2D4739] transition-transform duration-150 active:scale-95">
<span class="material-symbols-outlined" data-icon="info">info</span>
<span class="font-label-sm text-[11px] font-medium uppercase tracking-wider mt-1">Details</span>
</div>
</nav>
<!-- Coordinates Overlay (Specialized Element) -->
<div class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900/80 backdrop-blur-md px-4 py-2 rounded-full flex items-center gap-4 text-white/90 shadow-xl border border-white/10 hidden md:flex">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="explore">explore</span>
<span class="text-[12px] font-mono tracking-tighter">N 45° 31' 23"</span>
</div>
<div class="w-[1px] h-3 bg-white/20"></div>
<div class="flex items-center gap-2">
<span class="text-[12px] font-mono tracking-tighter">W 122° 40' 35"</span>
</div>
</div>
</body></html>
